<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COLREGS Playlist | TheRulesGuide.com</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b1220;
      --card: #121a2f;
      --accent: #3b82f6;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(180deg, #0b1220, #020617);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 1.5rem 1rem;
      text-align: center;
    }

    h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      margin-bottom: 0.45rem;
    }

    header p {
      color: var(--muted);
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    .playlist-card {
      width: min(960px, 100%);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: clamp(1rem, 2.5vw, 1.5rem);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.35);
    }

    .playlist-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    .playlist-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .back-link {
      display: inline-block;
      margin-top: 1rem;
      text-decoration: none;
      color: #bfdbfe;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>COLREGS Video Playlist</h1>
    <p>Study the Rules of the Road with this embedded playlist.</p>
  </header>

  <main>
    <section class="playlist-card">
      <div class="playlist-wrapper">
        <iframe src="https://www.youtube-nocookie.com/embed/videoseries?si=8oLrlc-vOhT3YWrX&amp;list=PLhumSvKZ_j2KRLs4dccnPQx47T1PeiwCn" title="YouTube video player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
      <a class="back-link" href="index.html">← Back to Main Page</a>
    </section>
  </main>
</body>
</html>
